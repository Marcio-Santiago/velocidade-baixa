<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Resultados das Corridas — Velocidade Baixa 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Titillium+Web:wght@400;600;700&family=Metal+Mania&display=swap" rel="stylesheet">
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }

    body{
      font-family:'Titillium Web',sans-serif;
      background:linear-gradient(135deg,#0a0a0f 0%,#1a1a2e 50%,#0d0d1a 100%);
      color:#fff; min-height:100vh;
      padding:76px 32px 48px;
    }

    /* ── NAV ─────────────────────────────────────────────────── */
    .fixed-nav{
      position:fixed;top:0;left:0;right:0;z-index:9999;height:60px;
      display:flex;align-items:center;padding:0 22px;gap:0;
      background:linear-gradient(135deg,rgba(8,8,14,.94) 0%,rgba(20,20,38,.96) 50%,rgba(10,10,18,.94) 100%);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,.09);
      box-shadow:0 4px 30px rgba(0,0,0,.55);
    }
    .nav-brand{
      font-family:'Bebas Neue',sans-serif;font-size:1em;letter-spacing:3px;color:#fff;
      display:flex;align-items:center;gap:8px;white-space:nowrap;
      text-decoration:none;margin-right:18px;flex-shrink:0;
    }
    .nav-brand em{color:#c9a227;font-style:normal;}
    .nav-spacer{flex:1;}
    .nav-items{display:flex;gap:6px;align-items:center;flex-wrap:nowrap;}
    .nav-items a{
      font-family:'Bebas Neue',sans-serif;font-size:.85em;letter-spacing:2px;
      padding:7px 13px;border-radius:20px;text-decoration:none;
      color:rgba(255,255,255,.72);background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);transition:all .2s;white-space:nowrap;
    }
    .nav-items a:hover{color:#fff;background:rgba(124,58,237,.28);border-color:rgba(124,58,237,.5);}
    .nav-items a.active{
      color:#fff;background:linear-gradient(135deg,#4f46e5,#7c3aed);
      border-color:#7c3aed;box-shadow:0 2px 16px rgba(124,58,237,.45);
    }
    @media(max-width:768px){
      .fixed-nav{height:auto;padding:10px 14px;flex-wrap:wrap;gap:8px;}
      .nav-spacer{display:none;}
      .nav-items{flex-wrap:wrap;gap:5px;}
      .nav-items a{font-size:.78em;padding:6px 10px;}
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    .page-header{
      text-align:center;margin-bottom:36px;padding:36px 40px 32px;
      background:linear-gradient(145deg,#0e0818 0%,#1c0f38 30%,#2e1560 60%,#1a0d32 100%);
      border-radius:18px;
      box-shadow:0 24px 64px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.07),0 0 0 1px rgba(201,162,39,.18);
      position:relative;overflow:hidden;
    }
    .page-header::before{
      content:'';position:absolute;inset:0;
      background:repeating-linear-gradient(-55deg,transparent,transparent 6px,rgba(255,255,255,.018) 6px,rgba(255,255,255,.018) 7px);
      pointer-events:none;
    }
    .page-header::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,transparent 0%,#c9a227 25%,#e6c84a 50%,#c9a227 75%,transparent 100%);
    }
    .page-header h1{
      font-family:'Metal Mania',cursive;font-size:3em;font-weight:400;
      text-transform:uppercase;letter-spacing:4px;color:#fff;
      text-shadow:3px 3px 0 rgba(0,0,0,.55),0 0 50px rgba(180,140,255,.28);
      position:relative;z-index:1;margin:0;
    }
    .page-header .subtitle{
      font-family:'Rajdhani',sans-serif;font-size:1em;font-weight:500;
      color:rgba(255,255,255,.45);margin-top:10px;letter-spacing:5px;
      text-transform:uppercase;position:relative;z-index:1;
    }

    /* ── GRID DE ETAPAS ─────────────────────────────────────── */
    .etapas-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:20px;
      margin-top:8px;
    }

    /* ── CARD DA ETAPA ──────────────────────────────────────── */
    .etapa-card{
      background:linear-gradient(160deg,rgba(255,255,255,.10) 0%,rgba(255,255,255,.03) 100%);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:0;
      overflow:hidden;
      cursor:pointer;
      transition:transform .25s,box-shadow .25s,border-color .25s;
      position:relative;
    }
    .etapa-card:hover{
      transform:translateY(-6px);
      box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(201,162,39,.35);
      border-color:rgba(201,162,39,.4);
    }
    .etapa-card.pendente{
      opacity:.5;cursor:default;
    }
    .etapa-card.pendente:hover{transform:none;box-shadow:none;border-color:rgba(255,255,255,.12);}

    .card-top{
      padding:18px 20px 14px;
      background:linear-gradient(135deg,#1a0f35 0%,#2d1b55 60%,#3d1a78 100%);
      border-bottom:2px solid #c9a227;
      display:flex;align-items:center;justify-content:space-between;
    }
    .card-etapa-num{
      font-family:'Bebas Neue',sans-serif;font-size:1em;
      letter-spacing:3px;color:rgba(255,255,255,.5);
    }
    .card-bandeira{font-size:2em;}
    .card-status-badge{
      font-family:'Bebas Neue',sans-serif;font-size:.72em;letter-spacing:2px;
      padding:3px 10px;border-radius:20px;
    }
    .badge-ok  {background:rgba(22,101,52,.8);color:#86efac;border:1px solid rgba(74,222,128,.35);}
    .badge-sprint{background:rgba(180,60,0,.7);color:#fdba74;border:1px solid rgba(251,146,60,.35);}
    .badge-pendente{background:rgba(30,30,50,.8);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1);}

    .card-body{padding:16px 20px 18px;}
    .card-gp{
      font-family:'Bebas Neue',sans-serif;font-size:1.3em;
      letter-spacing:2px;color:#fff;margin-bottom:4px;
    }
    .card-circuito{
      font-family:'Rajdhani',sans-serif;font-size:.88em;
      opacity:.55;letter-spacing:1px;margin-bottom:14px;
    }

    /* Pódio mini */
    .mini-podio{display:flex;gap:8px;align-items:flex-end;margin-bottom:14px;}
    .mini-pos{
      flex:1;border-radius:10px;padding:8px 6px;text-align:center;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
    }
    .mini-pos.p1{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.08);}
    .mini-pos.p2{border-color:rgba(192,192,192,.4);background:rgba(192,192,192,.06);}
    .mini-pos.p3{border-color:rgba(205,127,50,.4);background:rgba(205,127,50,.06);}
    .mini-pos .medal{font-size:.7em;opacity:.7;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
    .mini-pos .pname{font-family:'Bebas Neue',sans-serif;font-size:.95em;letter-spacing:1px;margin-top:2px;}
    .mini-pos.p1 .pname{color:#fbbf24;}
    .mini-pos.p2 .pname{color:#c0c0c0;}
    .mini-pos.p3 .pname{color:#cd7f32;}

    /* Destaques mini */
    .card-destaques{
      display:flex;gap:6px;flex-wrap:wrap;
    }
    .destaque-tag{
      font-family:'Rajdhani',sans-serif;font-size:.75em;font-weight:600;
      padding:3px 9px;border-radius:20px;letter-spacing:.5px;
    }
    .dt-pole {background:rgba(201,162,39,.15);color:#c9a227;border:1px solid rgba(201,162,39,.35);}
    .dt-vr   {background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.35);}
    .dt-limpa{background:rgba(74,222,128,.12);color:#86efac;border:1px solid rgba(74,222,128,.3);}
    .dt-dia  {background:rgba(251,191,36,.13);color:#fde68a;border:1px solid rgba(251,191,36,.35);}

    .card-hover-hint{
      position:absolute;bottom:10px;right:14px;
      font-family:'Rajdhani',sans-serif;font-size:.7em;letter-spacing:2px;
      text-transform:uppercase;color:rgba(255,255,255,.25);
      transition:color .2s;
    }
    .etapa-card:hover .card-hover-hint{color:rgba(201,162,39,.7);}

    /* ── MODAL ─────────────────────────────────────────────── */
    .modal-overlay{
      display:none;position:fixed;inset:0;z-index:10000;
      background:rgba(0,0,0,.82);backdrop-filter:blur(8px);
      align-items:center;justify-content:center;padding:16px;
    }
    .modal-overlay.open{display:flex;}

    .modal{
      background:linear-gradient(160deg,#0e0818 0%,#1a1030 50%,#0a0a1a 100%);
      border:1px solid rgba(201,162,39,.3);
      border-radius:22px;
      width:100%;max-width:780px;max-height:92vh;
      overflow-y:auto;
      box-shadow:0 40px 120px rgba(0,0,0,.8),0 0 0 1px rgba(201,162,39,.12);
      position:relative;
      animation:modalIn .28s cubic-bezier(.4,.2,.2,1);
    }
    @keyframes modalIn{
      from{opacity:0;transform:scale(.94) translateY(16px);}
      to  {opacity:1;transform:scale(1)   translateY(0);}
    }

    .modal-header{
      padding:24px 28px 20px;
      background:linear-gradient(135deg,#1a0f35 0%,#2d1b55 60%,#4a1f8a 100%);
      border-bottom:3px solid #c9a227;
      display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
      position:sticky;top:0;z-index:2;
    }
    .modal-title-block{}
    .modal-etapa-label{
      font-family:'Rajdhani',sans-serif;font-size:.85em;letter-spacing:3px;
      text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:4px;
    }
    .modal-gp-name{
      font-family:'Metal Mania',cursive;font-size:1.9em;
      color:#fff;letter-spacing:2px;line-height:1.1;
    }
    .modal-gp-sub{
      font-family:'Rajdhani',sans-serif;font-size:.9em;opacity:.5;margin-top:4px;letter-spacing:2px;
    }
    .modal-close{
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
      color:#fff;border-radius:50%;width:38px;height:38px;min-width:38px;
      font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all .2s;flex-shrink:0;margin-top:4px;
    }
    .modal-close:hover{background:rgba(255,0,0,.25);border-color:rgba(255,80,80,.5);}

    .modal-body{padding:24px 28px 28px;}

    /* Seção dentro do modal */
    .m-section{margin-bottom:28px;}
    .m-section-title{
      font-family:'Bebas Neue',sans-serif;font-size:1.15em;letter-spacing:4px;
      color:#c9a227;text-transform:uppercase;margin-bottom:14px;
      padding-bottom:8px;border-bottom:1px solid rgba(201,162,39,.2);
      display:flex;align-items:center;gap:10px;
    }

    /* Tabela de resultados no modal */
    .res-table{width:100%;border-collapse:collapse;}
    .res-table thead tr{
      background:linear-gradient(135deg,#1a0f35,#2d1b55);
    }
    .res-table th{
      font-family:'Bebas Neue',sans-serif;font-size:.85em;letter-spacing:2px;
      padding:10px 12px;text-align:left;color:rgba(255,255,255,.8);
      border-bottom:2px solid #c9a227;
    }
    .res-table th:last-child{text-align:center;}
    .res-table td{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.07);
      font-family:'Rajdhani',sans-serif;font-size:1em;font-weight:600;
      vertical-align:middle;
    }
    .res-table tbody tr:hover td{background:rgba(201,162,39,.06);}
    .res-table tbody tr:last-child td{border-bottom:none;}

    .pos-cell{
      font-family:'Bebas Neue',sans-serif;font-size:1.4em;
      color:#c9a227;width:40px;text-align:center;
    }
    .pos-cell.p1{color:#fbbf24;}
    .pos-cell.p2{color:#c0c0c0;}
    .pos-cell.p3{color:#cd7f32;}
    .pos-cell.dsq-pos{color:#f87171;font-size:1em;}

    .driver-cell{display:flex;flex-direction:column;gap:1px;}
    .driver-name-m{font-size:1.05em;letter-spacing:1px;}
    .driver-team-m{font-size:.75em;opacity:.45;letter-spacing:1px;}

    .pts-cell-m{
      font-family:'Bebas Neue',sans-serif;font-size:1.3em;
      color:#c9a227;text-align:center;min-width:54px;
    }
    .pts-cell-m .bonus-pts{
      display:inline-block;font-size:.65em;color:#fbbf24;
      margin-left:2px;vertical-align:top;margin-top:2px;
    }
    .dsq-cell{color:#f87171;font-family:'Bebas Neue',sans-serif;font-size:.9em;text-align:center;}

    /* Bonus inline tags */
    .inline-bonus{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
    .ib{
      font-family:'Bebas Neue',sans-serif;font-size:.6em;letter-spacing:1px;
      padding:2px 7px;border-radius:20px;
    }
    .ib-pole {background:rgba(201,162,39,.18);color:#c9a227; border:1px solid rgba(201,162,39,.4);}
    .ib-vr   {background:rgba(168,85,247,.18);color:#c084fc;border:1px solid rgba(168,85,247,.4);}
    .ib-limpa{background:rgba(74,222,128,.14);color:#86efac;border:1px solid rgba(74,222,128,.35);}
    .ib-dia  {background:rgba(251,191,36,.15);color:#fde68a; border:1px solid rgba(251,191,36,.4);}

    /* Destaques grid */
    .destaques-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;
    }
    .destaque-box{
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      border-radius:12px;padding:12px 14px;
    }
    .destaque-box .d-icon{font-size:1.4em;margin-bottom:6px;}
    .destaque-box .d-label{
      font-family:'Bebas Neue',sans-serif;font-size:.8em;letter-spacing:2px;
      color:rgba(255,255,255,.45);margin-bottom:4px;
    }
    .destaque-box .d-value{
      font-family:'Bebas Neue',sans-serif;font-size:1.15em;letter-spacing:1px;
    }

    /* Pódio visual no modal */
    .podio-row{
      display:flex;gap:12px;justify-content:center;align-items:flex-end;
      margin-bottom:22px;flex-wrap:wrap;
    }
    .podio-item{
      text-align:center;padding:16px 20px 12px;border-radius:14px;
      min-width:130px;
    }
    .podio-item.p1{
      background:linear-gradient(160deg,rgba(251,191,36,.18),rgba(0,0,0,.4));
      border:1px solid rgba(251,191,36,.45);
      box-shadow:0 8px 30px rgba(251,191,36,.15);
      padding-top:22px;
    }
    .podio-item.p2{
      background:linear-gradient(160deg,rgba(192,192,192,.14),rgba(0,0,0,.4));
      border:1px solid rgba(192,192,192,.35);
    }
    .podio-item.p3{
      background:linear-gradient(160deg,rgba(205,127,50,.14),rgba(0,0,0,.4));
      border:1px solid rgba(205,127,50,.35);
    }
    .podio-medal{font-size:2em;margin-bottom:6px;}
    .podio-nome{font-family:'Bebas Neue',sans-serif;font-size:1.25em;letter-spacing:2px;}
    .p1 .podio-nome{color:#fbbf24;}
    .p2 .podio-nome{color:#c0c0c0;}
    .p3 .podio-nome{color:#cd7f32;}
    .podio-equipe{font-family:'Rajdhani',sans-serif;font-size:.78em;opacity:.5;letter-spacing:1px;margin-top:2px;}
    .podio-pts{
      font-family:'Bebas Neue',sans-serif;font-size:1.6em;
      color:#c9a227;margin-top:8px;
    }

    /* Responsivo */
    @media(max-width:600px){
      .modal-body{padding:18px 16px 22px;}
      .modal-header{padding:18px 16px 14px;}
      .modal-gp-name{font-size:1.4em;}
      .res-table th,.res-table td{padding:8px 8px;}
      .podio-item{min-width:100px;padding:12px 12px 10px;}
      body{padding:76px 14px 48px;}
    }
  </style>
</head>

  <!-- HEADER -->
  <div class="page-header">
    <h1>Resultados das Corridas</h1>
    <div class="subtitle">Temporada 2026 — Clique em uma etapa para ver o resumo completo</div>
  </div>

  <!-- GRID -->
  <div class="etapas-grid" id="etapasGrid"></div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header" id="modalHeader"></div>
      <div class="modal-body"  id="modalBody"></div>
    </div>
  </div>

  <script src="dados.js"></script>
  <script>
  // ── Helpers ───────────────────────────────────────────────────
  const TEAM_COLORS = {
    "McLaren":      "#ff8000",
    "Ferrari":      "#e8002d",
    "Mercedes":     "#00d2be",
    "Aston Martin": "#006f62",
    "Kick Sauber":  "#b4dc00",
  };

  function teamColor(equipe) {
    return TEAM_COLORS[equipe] || "#fff";
  }

  // Pontos bônus de um piloto numa etapa (corrida principal)
  function bonusRace(et, nome) {
    if (!et.resultado || !et.resultado.length) return { pts:0, tags:[] };
    const r = et.resultado.find(x => x.piloto === nome);
    let pts = 0; const tags = [];
    if (et.polePosition === nome)              { pts++; tags.push('pole'); }
    if (et.voltaRapida  === nome && r?.pos<=10){ pts++; tags.push('vr'); }
    if (et.corridaLimpa === nome)              { pts++; tags.push('limpa'); }
    if (et.pilotoDia    === nome)              { pts++; tags.push('dia'); }
    return { pts, tags };
  }

  // Pontos bônus de um piloto no sprint da etapa
  function bonusSprint(et, nome) {
    if (!et.sprint || !et.sprint.length) return { pts:0, tags:[] };
    const hasRace = et.resultado && et.resultado.length > 0;
    const pf = hasRace
      ? { pole:'polePositionSprint', vr:'voltaRapidaSprint',
          limpa:'corridaLimpaSprint', dia:'pilotoDiaSprint' }
      : { pole:'polePosition', vr:'voltaRapida',
          limpa:'corridaLimpa', dia:'pilotoDia' };
    const rs = et.sprint.find(x => x.piloto === nome);
    if (rs?.dsq) return { pts:0, tags:[], dsq:true };
    let pts = 0; const tags = [];
    if (et[pf.pole]  === nome)              { pts++; tags.push('pole'); }
    if (et[pf.vr]    === nome && rs?.pos<=10){ pts++; tags.push('vr'); }
    if (et[pf.limpa] === nome)              { pts++; tags.push('limpa'); }
    if (et[pf.dia]   === nome)              { pts++; tags.push('dia'); }
    return { pts, tags };
  }

  function bonusTagsHtml(tags, prefix) {
    const map = {
      pole:  `<span class="ib ib-pole">${prefix ? prefix+'Pole' : 'Pole'} +1</span>`,
      vr:    `<span class="ib ib-vr">${prefix ? prefix+'V.Rápida' : 'V.Rápida'} +1</span>`,
      limpa: `<span class="ib ib-limpa">${prefix ? prefix+'Limpa' : 'Limpa'} +1</span>`,
      dia:   `<span class="ib ib-dia">${prefix ? prefix+'Piloto Dia' : 'Piloto Dia'} +1</span>`,
    };
    return tags.map(t => map[t] || '').join('');
  }

  // ── Renderizar grid de etapas ─────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('etapasGrid');
    grid.innerHTML = '';

    resultados.forEach(et => {
      const hasRace  = et.resultado && et.resultado.length > 0;
      const hasSp    = et.sprint    && et.sprint.length    > 0;
      const disputada = hasRace || hasSp;

      // Pódio para o card
      const fonte = hasRace ? et.resultado : (et.sprint || []);
      const p1 = fonte.find(r => r.pos === 1 && !r.dsq);
      const p2 = fonte.find(r => r.pos === 2 && !r.dsq);
      const p3 = fonte.find(r => r.pos === 3 && !r.dsq);

      // Badge
      let badgeHtml = '';
      if (!disputada) {
        badgeHtml = '<span class="card-status-badge badge-pendente">Pendente</span>';
      } else if (hasRace) {
        badgeHtml = '<span class="card-status-badge badge-ok">✓ Disputada</span>';
      } else {
        badgeHtml = '<span class="card-status-badge badge-sprint">⚡ Sprint</span>';
      }

      // Mini pódio
      const miniPodio = disputada && p1 ? `
        <div class="mini-podio">
          <div class="mini-pos p2">
            <div class="medal">2º</div>
            <div class="pname">${p2?.piloto || '—'}</div>
          </div>
          <div class="mini-pos p1">
            <div class="medal">1º</div>
            <div class="pname">${p1?.piloto || '—'}</div>
          </div>
          <div class="mini-pos p3">
            <div class="medal">3º</div>
            <div class="pname">${p3?.piloto || '—'}</div>
          </div>
        </div>` : `<div style="height:60px;display:flex;align-items:center;opacity:.3;font-family:'Rajdhani',sans-serif;letter-spacing:2px;font-size:.9em;">Aguardando corrida…</div>`;

      // Destaques
      const destaques = [];
      if (et.polePosition)       destaques.push(`<span class="destaque-tag dt-pole">🏁 ${et.polePosition}</span>`);
      if (et.voltaRapida)        destaques.push(`<span class="destaque-tag dt-vr">⏱️ ${et.voltaRapida}</span>`);
      if (et.corridaLimpa)       destaques.push(`<span class="destaque-tag dt-limpa">🛡️ ${et.corridaLimpa}</span>`);
      if (et.pilotoDia)          destaques.push(`<span class="destaque-tag dt-dia">⭐ ${et.pilotoDia}</span>`);
      if (et.polePositionSprint) destaques.push(`<span class="destaque-tag dt-pole">🏁S ${et.polePositionSprint}</span>`);
      if (et.voltaRapidaSprint)  destaques.push(`<span class="destaque-tag dt-vr">⏱️S ${et.voltaRapidaSprint}</span>`);

      const card = document.createElement('div');
      card.className = 'etapa-card' + (disputada ? '' : ' pendente');
      card.innerHTML = `
        <div class="card-top">
          <span class="card-etapa-num">ETAPA #${et.etapa}</span>
          <span class="card-bandeira">${et.bandeira}</span>
          ${badgeHtml}
        </div>
        <div class="card-body">
          <div class="card-gp">${et.gp}</div>
          <div class="card-circuito">📍 ${et.circuito} &nbsp;·&nbsp; 📅 ${et.data}</div>
          ${miniPodio}
          ${destaques.length ? `<div class="card-destaques">${destaques.join('')}</div>` : ''}
        </div>
        ${disputada ? '<div class="card-hover-hint">ver detalhes →</div>' : ''}`;

      if (disputada) {
        card.addEventListener('click', () => openModal(et));
      }
      grid.appendChild(card);
    });
  }

  // ── Modal ─────────────────────────────────────────────────────
  function openModal(et) {
    const hasRace = et.resultado && et.resultado.length > 0;
    const hasSp   = et.sprint    && et.sprint.length    > 0;

    // Header
    document.getElementById('modalHeader').innerHTML = `
      <div class="modal-title-block">
        <div class="modal-etapa-label">Etapa #${et.etapa} &nbsp;·&nbsp; ${et.data}/2026</div>
        <div class="modal-gp-name">${et.bandeira} ${et.gp}</div>
        <div class="modal-gp-sub">📍 ${et.circuito}${hasSp ? ' &nbsp;·&nbsp; ⚡ Etapa com Sprint' : ''}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>`;

    let bodyHtml = '';

    // ── Pódio visual (corrida principal ou sprint se não houve corrida)
    const pFonte = hasRace ? et.resultado : et.sprint;
    const top3 = [
      pFonte.find(r=>r.pos===2&&!r.dsq),
      pFonte.find(r=>r.pos===1&&!r.dsq),
      pFonte.find(r=>r.pos===3&&!r.dsq),
    ];
    const pClass  = ['p2','p1','p3'];
    const pMedals = ['🥈','🥇','🥉'];

    const podoTitle = hasRace ? '🏆 Pódio da Corrida' : '⚡ Pódio do Sprint';
    bodyHtml += `<div class="m-section">
      <div class="m-section-title">${podoTitle}</div>
      <div class="podio-row">`;

    top3.forEach((r, i) => {
      if (!r) return;
      const cor = teamColor(r.equipe);
      const bon = hasRace ? bonusRace(et, r.piloto) : bonusSprint(et, r.piloto);
      bodyHtml += `
        <div class="podio-item ${pClass[i]}">
          <div class="podio-medal">${pMedals[i]}</div>
          <div class="podio-nome" style="color:${cor};text-shadow:0 0 12px ${cor}66;">${r.piloto}</div>
          <div class="podio-equipe">${r.equipe}</div>
          <div class="podio-pts">${(r.pontos||0) + bon.pts} pts</div>
        </div>`;
    });
    bodyHtml += `</div></div>`;

    // ── Sprint (se houver) ─────────────────────────────────────
    if (hasSp) {
      bodyHtml += `<div class="m-section">
        <div class="m-section-title">⚡ Classificação — Sprint</div>
        <table class="res-table">
          <thead><tr>
            <th style="width:44px">Pos</th>
            <th>Piloto</th>
            <th>Equipe</th>
            <th style="text-align:center">Pts Sprint</th>
          </tr></thead><tbody>`;

      et.sprint.forEach(r => {
        const cor = teamColor(r.equipe);
        const bon = bonusSprint(et, r.piloto);
        const posCell = r.dsq
          ? `<td class="pos-cell dsq-pos">DSQ</td>`
          : `<td class="pos-cell ${r.pos<=3?'p'+r.pos:''}">${r.pos}º</td>`;
        const ptsCell = r.dsq
          ? `<td class="dsq-cell">— <span style="font-size:.7em;color:#f87171">(-3 SL)</span></td>`
          : `<td class="pts-cell-m">${r.pontos + bon.pts}${bon.pts>0?`<span class="bonus-pts">+${bon.pts}</span>`:''}</td>`;

        bodyHtml += `<tr>
          ${posCell}
          <td class="driver-cell">
            <span class="driver-name-m" style="color:${cor}">${r.piloto}</span>
            ${bon.tags.length ? `<div class="inline-bonus">${bonusTagsHtml(bon.tags,'')}</div>` : ''}
          </td>
          <td class="driver-team-m" style="opacity:.65;font-family:'Rajdhani',sans-serif;">${r.equipe}</td>
          ${ptsCell}
        </tr>`;
      });
      bodyHtml += `</tbody></table></div>`;
    }

    // ── Corrida principal ──────────────────────────────────────
    if (hasRace) {
      bodyHtml += `<div class="m-section">
        <div class="m-section-title">🏁 Classificação — Corrida</div>
        <table class="res-table">
          <thead><tr>
            <th style="width:44px">Pos</th>
            <th>Piloto</th>
            <th>Equipe</th>
            <th style="text-align:center">Pts</th>
          </tr></thead><tbody>`;

      et.resultado.forEach(r => {
        const cor = teamColor(r.equipe);
        const bon = bonusRace(et, r.piloto);
        const totalPts = (r.pontos||0) + bon.pts;
        const nc = r.pontos === 0 && r.pos === 10;

        bodyHtml += `<tr>
          <td class="pos-cell ${r.pos<=3?'p'+r.pos:''}">${r.pos}º</td>
          <td class="driver-cell">
            <span class="driver-name-m" style="color:${cor}">${r.piloto}</span>
            ${bon.tags.length ? `<div class="inline-bonus">${bonusTagsHtml(bon.tags,'')}</div>` : ''}
          </td>
          <td style="opacity:.65;font-family:'Rajdhani',sans-serif;">${r.equipe}</td>
          <td class="pts-cell-m">${nc ? '<span style="opacity:.4;font-size:.85em;">NC</span>' : totalPts}${bon.pts>0&&!nc?`<span class="bonus-pts">+${bon.pts}</span>`:''}</td>
        </tr>`;
      });
      bodyHtml += `</tbody></table></div>`;
    }

    // ── Destaques ──────────────────────────────────────────────
    const dest = [];
    if (et.polePosition)       dest.push({icon:'🏁',label:'Pole Position',value:et.polePosition});
    if (et.voltaRapida)        dest.push({icon:'⏱️',label:'Volta Mais Rápida',value:et.voltaRapida});
    if (et.corridaLimpa)       dest.push({icon:'🛡️',label:'Pilotagem Limpa',value:et.corridaLimpa});
    if (et.pilotoDia)          dest.push({icon:'⭐',label:'Piloto do Dia',value:et.pilotoDia});
    if (et.polePositionSprint) dest.push({icon:'🏁',label:'Pole Sprint',value:et.polePositionSprint});
    if (et.voltaRapidaSprint)  dest.push({icon:'⏱️',label:'VR Sprint',value:et.voltaRapidaSprint});
    if (et.corridaLimpaSprint) dest.push({icon:'🛡️',label:'Limpa Sprint',value:et.corridaLimpaSprint});
    if (et.pilotoDiaSprint)    dest.push({icon:'⭐',label:'Piloto Dia Sprint',value:et.pilotoDiaSprint});

    if (dest.length) {
      bodyHtml += `<div class="m-section">
        <div class="m-section-title">🎖️ Destaques da Etapa</div>
        <div class="destaques-grid">`;
      dest.forEach(d => {
        const cor = (PILOTOS.find(p=>p.nome===d.value)||{}).cor || '#fff';
        bodyHtml += `<div class="destaque-box">
          <div class="d-icon">${d.icon}</div>
          <div class="d-label">${d.label}</div>
          <div class="d-value" style="color:${cor};text-shadow:0 0 8px ${cor}55">${d.value}</div>
        </div>`;
      });
      bodyHtml += `</div></div>`;
    }

    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // Fechar clicando fora
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // Fechar com Esc
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Init ──────────────────────────────────────────────────────
  renderGrid();
  </script>
</body>
</html>
